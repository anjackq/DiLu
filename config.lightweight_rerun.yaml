base_config: config.yaml

############ Lightweight invalid-pair rerun config ############
# This config keeps the same benchmark, stop-capable profile, and scoring
# as config.yaml, but relaxes timeout containment for targeted reruns.

############ Eval timeout ladder behavior ############
eval_timeout_policy_mode: laddered
eval_timeout_ladder_sec: [20, 30, 45]
eval_timeout_recovery_successes: 3
eval_timeout_early_stop_enabled: true
eval_timeout_early_stop_min_decisions: 8
eval_timeout_early_stop_consecutive_timeout_fallbacks: 4
eval_timeout_early_stop_collapse_rate_threshold: 0.8
eval_timeout_early_stop_require_max_timeout_level: true
eval_timeout_model_quarantine_after_collapses: 4
