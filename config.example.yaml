############ Full runtime config reference ############
# `config.yaml` is the lean active Ollama/eval config checked into the repo.
# This file is the fuller option catalog with provider placeholders, optional
# overrides, and legacy-compatible keys that are still supported by the code.

############ Provider selection ############
OPENAI_API_TYPE: 'ollama' # openai | azure | ollama | gemini

# OpenAI settings
OPENAI_KEY: ''
OPENAI_CHAT_MODEL: null
OPENAI_REFLECTION_MODEL: null

# Azure OpenAI settings
AZURE_API_BASE: null # https://xxxxxxx.openai.azure.com/
AZURE_API_VERSION: "2023-07-01-preview"
AZURE_API_KEY: null
AZURE_CHAT_DEPLOY_NAME: null
AZURE_EMBED_DEPLOY_NAME: null

# Gemini settings
GEMINI_API_KEY: ''
GEMINI_CHAT_MODEL: 'gemini-2.0-flash'
GEMINI_REFLECTION_MODEL: null

# Local model / Ollama settings
OLLAMA_API_BASE: 'http://localhost:11434/v1'
OLLAMA_CHAT_MODEL: 'qwen3.5:0.8b'
OLLAMA_REFLECTION_MODEL: null
OLLAMA_EMBED_MODEL: 'qwen3-embedding:8b'
OLLAMA_API_KEY: 'ollama'
# Allowed: auto | think | no_think
OLLAMA_THINK_MODE: 'auto'
OLLAMA_USE_NATIVE_CHAT: false
OLLAMA_NATIVE_CHAT_TIMEOUT_SEC: 60

############ DiLu settings ############
reflection_module: false
reflection_interactive: true
reflection_auto_add: false
reflection_add_every_n: 5
few_shot_num: 1
episodes_num: 5
memory_path: 'memories/20_mem'

############ Structured results ############
results_root: 'results/'
experiment_id: null
run_id: null

# Legacy direct output override (optional)
result_folder_override: null
result_folder: null

############ Simulation environment resolver ############
sim_env_id: "highway-fast-v0"
sim_use_native_env_defaults: true
sim_action_target_speeds: [0, 5, 10, 15, 20, 25, 30]

# Optional explicit env overrides. These only matter when you want to override
# the native env preset loaded by `sim_env_id`.
simulation_duration: 30
vehicle_count: 20
other_vehicle_type: "highway_env.vehicle.behavior.IDMVehicle"
vehicles_density: 1.0
lanes_count: 3
simulation_frequency: 5
policy_frequency: 1
collision_reward: -1.0
high_speed_reward: 0.4
right_lane_reward: 0.1
lane_change_reward: 0.0
reward_speed_range: [20, 30]
normalize_reward: true
offroad_terminal: false
ego_spacing: 1.5
scaling: 5

# Deprecated aliases (still read, but prefer sim_* keys above).
rl_env_id: null
rl_use_native_env_defaults: null

############ Evaluation metrics ############
metrics_ttc_threshold_sec: 2.0
metrics_headway_threshold_m: 15.0
metrics_rear_ttc_threshold_sec: 2.5
metrics_rear_headway_threshold_m: 12.0
metrics_low_speed_blocking_threshold_mps: 8.5
metrics_blocking_front_gap_safe_m: 25.0
metrics_blocking_front_ttc_safe_sec: 4.0
metrics_stop_threshold_mps: 0.5
metrics_near_stop_threshold_mps: 2.0

############ Evaluation / runtime guardrails ############
quiet_mode: false
eval_quiet_mode: null
runtime_quiet_mode: null

progress_bar: true
eval_progress_bar: null
runtime_progress_bar: null
progress_reply_mode: off
eval_progress_reply_mode: null
runtime_progress_reply_mode: null

eval_decision_timeout_sec: 60
runtime_decision_timeout_sec: 60
eval_decision_max_output_tokens: 512
eval_disable_streaming: true
eval_disable_checker_llm: true
eval_performance_mode: default # default | fast
eval_ollama_preflight_enabled: true
eval_ollama_preflight_timeout_sec: 15
eval_measurement_hard_preflight_policy: skip_model # warn_run | skip_model | abort_run
eval_slow_decision_threshold_sec: 5.0
runtime_slow_decision_threshold_sec: 5.0
eval_save_run_artifacts: false
eval_run_id: null

############ Eval timeout ladder defaults ############
eval_timeout_policy_mode: laddered
eval_timeout_ladder_sec: [15, 20, 30]
eval_timeout_recovery_successes: 3
eval_timeout_early_stop_enabled: true
eval_timeout_early_stop_min_decisions: 5
eval_timeout_early_stop_consecutive_timeout_fallbacks: 3
eval_timeout_early_stop_collapse_rate_threshold: 0.8
eval_timeout_early_stop_require_max_timeout_level: true
eval_timeout_model_quarantine_after_collapses: 2

############ Legacy adaptive timeout penalty ############
# Used by runtime mode, and by eval only if you switch eval_timeout_policy_mode
# away from `laddered`.
adaptive_timeout_penalty_enabled: true
adaptive_timeout_halving_factor: 0.5
adaptive_timeout_min_sec: 4.0
adaptive_timeout_trigger_consecutive_slow: 2

############ Model-specific timeout overrides ############
model_policy_overrides:
  'gemini*pro*':
    decision_timeout_sec: 45
  'gemini*flash*':
    decision_timeout_sec: 35
  'qwen3.5:0.8b':
    decision_timeout_sec: 8
  'qwen3.5:2b':
    decision_timeout_sec: 10

# Legacy eval-only per-model overrides (still supported).
eval_model_overrides:
  'qwen3.5:0.8b':
    decision_timeout_sec: 8
  'qwen3.5:2b':
    decision_timeout_sec: 10
